name: Links

on:
  push:
  pull_request:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: External links
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check external links
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --exclude https://github.com/foksk76/compose-caddy-https-proxy
            --exclude https://app.example.com
            README.md CHANGELOG.md
          fail: true
